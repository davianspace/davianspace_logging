  - flutter
  - architecture
  - observability

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  davianspace_dependencyinjection: ^1.0.3

dev_dependencies:
  lints: ^6.0.0
  test: ^1.24.0
