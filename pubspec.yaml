name: davianspace_logging
description: Logging framework for Dart and Flutter inspired by Microsoft.Extensions.Logging with providers, filtering, scopes, structured logs, and JSON output.
version: 1.0.3
homepage: https://github.com/davianspace/davianspace_logging
repository: https://github.com/davianspace/davianspace_logging
issue_tracker: https://github.com/davianspace/davianspace_logging/issues
license: MIT

topics:
  - logging
